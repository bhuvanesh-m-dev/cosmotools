<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer by CosmoTools</title>

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS for quick, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip for exporting to ZIP files without a backend -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#60a5fa', /* Light Blue */
                            500: '#3b82f6', /* Blue */
                            600: '#2563eb', /* Deep Blue */
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-950 text-gray-200 min-h-screen flex flex-col h-screen overflow-hidden">

    <!-- Top Navigation Panel -->
    <nav
        class="shrink-0 bg-gray-900 border-b border-gray-800 px-6 py-4 flex flex-col md:flex-row shadow-lg justify-between items-center gap-4 z-10 w-full">
        <!-- Branding Area -->
        <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
            <h1
                class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-brand-400 to-indigo-400">
                Viewer <span class="text-gray-400 font-medium tracking-normal text-sm">by CosmoTools</span>
            </h1>
        </div>

        <!-- Action Buttons Area -->
        <div class="flex flex-wrap justify-center items-center gap-3">
            <button onclick="clearAll()"
                class="px-4 py-2 rounded-md bg-transparent hover:bg-red-500/10 text-gray-400 hover:text-red-400 transition-colors border border-gray-700 hover:border-red-500/30 text-sm font-medium flex items-center gap-2"
                title="Clear All Editors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
                Clear
            </button>
            <button onclick="shareLink()"
                class="px-4 py-2 rounded-md bg-gray-800 hover:bg-gray-700 transition-colors border border-gray-700 text-sm font-medium flex items-center gap-2"
                title="Share your code snippet">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z">
                    </path>
                </svg>
                Share
            </button>
            <button onclick="saveZip()"
                class="px-4 py-2 rounded-md bg-gray-800 hover:bg-gray-700 transition-colors border border-gray-700 text-sm font-medium flex items-center gap-2"
                title="Download structure as ZIP">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Save ZIP
            </button>
            <button onclick="launchPreview()"
                class="px-5 py-2 rounded-md bg-brand-600 hover:bg-brand-500 transition-colors text-white font-medium shadow-lg shadow-brand-500/20 flex items-center gap-2"
                title="Launch result in a new tab">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Launch Preview
            </button>
        </div>
    </nav>

    <!-- Main Content Grid -->
    <main class="flex-grow p-4 gap-4 grid grid-cols-1 lg:grid-cols-3 overflow-y-auto">
        <!-- Column 1: HTML -->
        <div
            class="flex flex-col bg-[#0d1117] rounded-xl border border-gray-800 overflow-hidden shadow-sm transition-all focus-within:ring-1 focus-within:ring-red-500/50 focus-within:border-red-500/50 h-full min-h-[300px]">
            <div
                class="bg-gray-900/50 px-4 py-3 border-b border-gray-800 flex items-center gap-2 text-sm font-medium text-red-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
                HTML
            </div>
            <textarea id="html-code"
                class="code-input flex-grow w-full bg-transparent p-4 text-gray-300 focus:outline-none resize-none"
                placeholder="<!-- Structure your Web App -->&#10;<main class=&quot;container&quot;>&#10;  <h1>Hello Player!</h1>&#10;  <p>Welcome to Viewer</p>&#10;</main>"
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>

        <!-- Column 2: CSS -->
        <div
            class="flex flex-col bg-[#0d1117] rounded-xl border border-gray-800 overflow-hidden shadow-sm transition-all focus-within:ring-1 focus-within:ring-blue-500/50 focus-within:border-blue-500/50 h-full min-h-[300px]">
            <div
                class="bg-gray-900/50 px-4 py-3 border-b border-gray-800 flex items-center gap-2 text-sm font-medium text-blue-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01">
                    </path>
                </svg>
                CSS
            </div>
            <textarea id="css-code"
                class="code-input flex-grow w-full bg-transparent p-4 text-gray-300 focus:outline-none resize-none"
                placeholder="/* Style your Application */&#10;.container {&#10;  padding: 2rem;&#10;  font-family: system-ui, sans-serif;&#10;  text-align: center;&#10;}&#10;&#10;h1 { color: #3b82f6; }"
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>

        <!-- Column 3: JavaScript -->
        <div
            class="flex flex-col bg-[#0d1117] rounded-xl border border-gray-800 overflow-hidden shadow-sm transition-all focus-within:ring-1 focus-within:ring-yellow-500/50 focus-within:border-yellow-500/50 h-full min-h-[300px]">
            <div
                class="bg-gray-900/50 px-4 py-3 border-b border-gray-800 flex items-center gap-2 text-sm font-medium text-yellow-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                JavaScript
            </div>
            <textarea id="js-code"
                class="code-input flex-grow w-full bg-transparent p-4 text-gray-300 focus:outline-none resize-none"
                placeholder="// Power your logic here&#10;console.log('Viewer by CosmoTools ready!');&#10;&#10;document.querySelector('h1').addEventListener('click', () => {&#10;  alert('Title clicked!');&#10;});"
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>
    </main>

    <!-- Project Footer -->
    <footer
        class="shrink-0 bg-gray-900 border-t border-gray-800 py-4 px-6 text-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
        <p class="text-xs text-gray-400">
            Standalone code previewer created for
            <a href="https://github.com/bhuvanesh-m-dev/cosmotools" target="_blank"
                class="text-brand-400 hover:text-brand-300 font-medium transition-colors">CosmoTools</a>.
            Fully client-side, 100% stateless execution.
        </p>
    </footer>

    <!-- Floating Toast Notification (Hidden by default) -->
    <div id="toast"
        class="fixed bottom-6 right-6 bg-gray-800 border-l-4 border-brand-500 text-gray-100 px-5 py-4 rounded-md shadow-2xl transition-all duration-300 translate-y-24 opacity-0 z-50 flex items-center gap-3 w-max">
        <svg id="toast-icon" class="w-5 h-5 text-brand-500 shrink-0" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="toast-message" class="text-sm font-medium">Message</span>
    </div>

    <!-- Application Logic -->
    <script src="script.js"></script>
</body>

</html>

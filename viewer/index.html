<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer by CosmoTools</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <!-- Ambient particles -->
    <div id="particles" class="particles-container"></div>
    
    <!-- Grid overlay -->
    <div class="grid-overlay"></div>

    <div class="container">
        <!-- Header -->
        <header class="glass-panel header">
            <div class="logo-section">
                <div class="logo-box">
                    <span>C</span>
                    <div class="status-indicator"></div>
                </div>
                <div class="title-section">
                    <h1>Viewer <span class="text-muted">by</span> CosmoTools</h1>
                    <p>HTML • CSS • JavaScript Playground</p>
                </div>
            </div>
            
            <a href="../index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span>Back to CosmoTools</span>
            </a>
        </header>

        <!-- Toolbar -->
        <div class="glass-panel toolbar">
            <div class="btn-group">
                <button onclick="launchPreview()" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polygon points="10 8 16 12 10 16 10 8"/>
                    </svg>
                    Launch Preview
                </button>
                
                <button onclick="saveAsZip()" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Export ZIP
                </button>
                
                <button onclick="shareCode()" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    Share
                </button>
            </div>
            
            <button onclick="clearAll()" class="btn btn-danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                Clear All
            </button>
        </div>

        <!-- Editors Grid -->
        <div class="editors-grid">
            <!-- HTML Editor -->
            <div class="editor-card">
                <div class="editor-header">
                    <label class="lang-label html-label">
                        <span class="dot html-dot"></span>
                        HTML
                    </label>
                    <span class="filename">index.html</span>
                </div>
                <textarea id="htmlCode" class="code-editor" placeholder="<!-- Enter HTML structure here -->" spellcheck="false"></textarea>
            </div>

            <!-- CSS Editor -->
            <div class="editor-card">
                <div class="editor-header">
                    <label class="lang-label css-label">
                        <span class="dot css-dot"></span>
                        CSS
                    </label>
                    <span class="filename">style.css</span>
                </div>
                <textarea id="cssCode" class="code-editor" placeholder="/* Enter styles here */" spellcheck="false"></textarea>
            </div>

            <!-- JavaScript Editor -->
            <div class="editor-card">
                <div class="editor-header">
                    <label class="lang-label js-label">
                        <span class="dot js-dot"></span>
                        JavaScript
                    </label>
                    <span class="filename">script.js</span>
                </div>
                <textarea id="jsCode" class="code-editor" placeholder="// Enter JavaScript here" spellcheck="false"></textarea>
            </div>
        </div>

        <!-- Footer -->
        <footer class="glass-panel footer">
            <div class="status-item">
                <span class="pulse-dot"></span>
                System Ready
            </div>
            <div class="divider"></div>
            <span>Client-side Processing</span>
            <div class="divider"></div>
            <a href="https://github.com/bhuvanesh-m-dev/cosmotools" target="_blank" class="github-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub
            </a>
        </footer>
    </div>

    <!-- Notification container -->
    <div id="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>

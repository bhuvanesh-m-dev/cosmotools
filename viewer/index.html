<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer by CosmoTools</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body>
    <!-- Space Background -->
    <div class="space-background">
        <div class="stars-layer layer-1"></div>
        <div class="stars-layer layer-2"></div>
        <div class="stars-layer layer-3"></div>
        <div class="nebula"></div>
        <div class="shooting-stars"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="glass-card">
            <div class="logo-section">
                <div class="logo-3d">
                    <div class="logo-face front">C</div>
                    <div class="logo-face back">C</div>
                    <div class="logo-face right"></div>
                    <div class="logo-face left"></div>
                    <div class="logo-face top"></div>
                    <div class="logo-face bottom"></div>
                </div>
                <div class="title-section">
                    <h1>Viewer <span class="dim">by</span> CosmoTools</h1>
                    <p>HTML • CSS • JavaScript Previewer</p>
                </div>
            </div>
            <a href="../index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>Back</span>
            </a>
        </header>

        <!-- Controls -->
        <div class="controls glass-card">
            <div class="btn-group main-actions">
                <button onclick="launchPreview()" class="btn btn-3d btn-primary">
                    <div class="btn-face">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        <span>Launch</span>
                    </div>
                    <div class="btn-shadow"></div>
                </button>
                
                <button onclick="saveAsZip()" class="btn btn-3d btn-secondary">
                    <div class="btn-face">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>Export</span>
                    </div>
                    <div class="btn-shadow"></div>
                </button>
            </div>

            <div class="btn-group share-actions">
                <button onclick="shareAsCode()" class="btn btn-3d btn-share-code">
                    <div class="btn-face">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        <span>Share as Code</span>
                    </div>
                    <div class="btn-shadow"></div>
                </button>

                <button onclick="shareAsPreview()" class="btn btn-3d btn-share-preview">
                    <div class="btn-face">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span>Share as Preview</span>
                    </div>
                    <div class="btn-shadow"></div>
                </button>
            </div>
            
            <button onclick="clearAll()" class="btn btn-3d btn-danger">
                <div class="btn-face">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    <span>Clear</span>
                </div>
                <div class="btn-shadow"></div>
            </button>
        </div>

        <!-- Editors -->
        <div class="editors-container">
            <!-- HTML Editor -->
            <div class="editor-wrapper">
                <div class="editor-card">
                    <div class="editor-header">
                        <div class="lang-badge">
                            <span class="indicator html-indicator"></span>
                            <span class="lang-name">HTML</span>
                        </div>
                        <span class="file-label">index.html</span>
                    </div>
                    <div class="editor-body">
                        <textarea id="htmlCode" placeholder="<!-- Enter HTML -->" spellcheck="false"></textarea>
                        <div class="editor-glow"></div>
                    </div>
                </div>
                <div class="card-shadow"></div>
            </div>

            <!-- CSS Editor -->
            <div class="editor-wrapper">
                <div class="editor-card">
                    <div class="editor-header">
                        <div class="lang-badge">
                            <span class="indicator css-indicator"></span>
                            <span class="lang-name">CSS</span>
                        </div>
                        <span class="file-label">style.css</span>
                    </div>
                    <div class="editor-body">
                        <textarea id="cssCode" placeholder="/* Enter CSS */" spellcheck="false"></textarea>
                        <div class="editor-glow"></div>
                    </div>
                </div>
                <div class="card-shadow"></div>
            </div>

            <!-- JS Editor -->
            <div class="editor-wrapper">
                <div class="editor-card">
                    <div class="editor-header">
                        <div class="lang-badge">
                            <span class="indicator js-indicator"></span>
                            <span class="lang-name">JavaScript</span>
                        </div>
                        <span class="file-label">script.js</span>
                    </div>
                    <div class="editor-body">
                        <textarea id="jsCode" placeholder="// Enter JavaScript" spellcheck="false"></textarea>
                        <div class="editor-glow"></div>
                    </div>
                </div>
                <div class="card-shadow"></div>
            </div>
        </div>

        <!-- QR Code Section -->
        <div class="qr-section glass-card">
            <div class="qr-header">
                <div class="qr-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <h3>Share Your Code</h3>
                </div>
                <p class="qr-subtitle">QR code updates dynamically based on your code</p>
            </div>
            
            <div class="qr-content">
                <div class="qr-preview-container">
                    <div id="qr-container"></div>
                    <div class="qr-overlay">
                        <span class="qr-label">Scan to preview</span>
                    </div>
                </div>
                
                <div class="qr-controls">
                    <div class="qr-options">
                        <div class="option-group">
                            <label>Style</label>
                            <select id="qr-style" onchange="updateQR()">
                                <option value="square">Classic</option>
                                <option value="dots">Dots</option>
                                <option value="rounded">Rounded</option>
                                <option value="extra-rounded">Smooth</option>
                            </select>
                        </div>
                        
                        <div class="option-group">
                            <label>Color</label>
                            <input type="color" id="qr-color" value="#ffffff" onchange="updateQR()">
                        </div>
                        
                        <div class="option-group">
                            <label>Background</label>
                            <input type="color" id="qr-bg" value="#000000" onchange="updateQR()">
                        </div>
                    </div>
                    
                    <div class="qr-actions">
                        <button onclick="downloadQR('png')" class="btn btn-3d btn-secondary">
                            <div class="btn-face">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                <span>Save PNG</span>
                            </div>
                            <div class="btn-shadow"></div>
                        </button>
                        
                        <button onclick="downloadQR('svg')" class="btn btn-3d btn-secondary">
                            <div class="btn-face">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                <span>Save SVG</span>
                            </div>
                            <div class="btn-shadow"></div>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="qr-footer">
                <p>Powered by <a href="https://github.com/bhuvanesh-m-dev/cosmotools/tree/main/cosmoencode" target="_blank">CosmoEncode</a> • 
                <a href="https://github.com/bhuvanesh-m-dev/cosmotools/blob/main/cosmoencode/qr-generator.js" target="_blank">QR Generator</a> • 
                <a href="https://github.com/bhuvanesh-m-dev/cosmotools/blob/main/cosmoencode/script.js" target="_blank">Script</a> • 
                <a href="https://github.com/bhuvanesh-m-dev/cosmotools/blob/main/cosmoencode/style.css" target="_blank">Styles</a></p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="glass-card">
            <div class="footer-content">
                <div class="status">
                    <div class="pulse-ring"></div>
                    <span>System Active</span>
                </div>
                <div class="separator"></div>
                <span class="dim">Client-side</span>
                <div class="separator"></div>
                <a href="https://github.com/bhuvanesh-m-dev/cosmotools" target="_blank" class="github-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    GitHub
                </a>
            </div>
        </footer>
    </div>

    <div id="notifications"></div>
    <script src="script.js"></script>
</body>
</html>

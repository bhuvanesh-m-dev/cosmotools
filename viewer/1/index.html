<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Viewer by CosmoTools – Code Previewer</title>
  <!-- Tailwind CSS + Font Awesome Icons + JSZip (lightweight, CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Add custom config to respect dark/light mode system preference, but we'll handle via class toggling -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Monaco', 'Cascadia Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- JSZip for ZIP generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* custom code editor style - clean, monospace, readable */
    textarea.code-editor {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      tab-size: 2;
      background: #f8f9ff;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
    }
    .dark textarea.code-editor {
      background: #0f172a;
      border-color: #334155;
      color: #e2e8f0;
    }
    textarea.code-editor:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    /* card styling */
    .card-hover {
      transition: box-shadow 0.2s ease, transform 0.1s ease;
    }
    .card-hover:hover {
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
    }
    .btn-primary {
      background-color: #3b82f6;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background-color: #2563eb;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background-color: #475569;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background-color: #334155;
      transform: translateY(-1px);
    }
    /* responsive improvements */
    @media (max-width: 768px) {
      textarea.code-editor {
        font-size: 0.8rem;
      }
    }
    /* custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    .dark ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

  <!-- Main Container -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10">
    
    <!-- Header / Title + Dark Mode Toggle -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-8 border-b border-gray-200 dark:border-gray-700 pb-5">
      <div>
        <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">
          <i class="fas fa-eye mr-2 text-indigo-500"></i> Viewer by CosmoTools
        </h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">HTML + CSS + JS real-time previewer · share, zip & launch</p>
      </div>
      <div class="flex gap-3">
        <!-- Dark mode toggle button -->
        <button id="themeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 w-10 h-10 flex items-center justify-center transition hover:scale-105">
          <i id="themeIcon" class="fas fa-moon"></i>
        </button>
      </div>
    </div>

    <!-- Action Buttons Bar -->
    <div class="flex flex-wrap gap-3 justify-between items-center mb-8 bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
      <div class="flex flex-wrap gap-3">
        <button id="launchBtn" class="btn-primary px-5 py-2.5 rounded-xl text-white font-medium shadow-md flex items-center gap-2">
          <i class="fas fa-rocket"></i> Launch Preview
        </button>
        <button id="zipBtn" class="bg-emerald-600 hover:bg-emerald-700 px-5 py-2.5 rounded-xl text-white font-medium shadow-sm flex items-center gap-2 transition">
          <i class="fas fa-file-archive"></i> Save as ZIP
        </button>
        <button id="shareBtn" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2.5 rounded-xl text-white font-medium shadow-sm flex items-center gap-2 transition">
          <i class="fas fa-share-alt"></i> Share
        </button>
        <button id="clearBtn" class="bg-rose-500 hover:bg-rose-600 px-5 py-2.5 rounded-xl text-white font-medium shadow-sm flex items-center gap-2 transition">
          <i class="fas fa-trash-alt"></i> Clear All
        </button>
      </div>
      <div class="text-xs text-gray-400 bg-gray-100 dark:bg-gray-800 px-3 py-1.5 rounded-full">
        <i class="fas fa-code-branch"></i> stateless · client-side
      </div>
    </div>

    <!-- Code Editors Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
      <!-- HTML Editor -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700 overflow-hidden card-hover">
        <div class="bg-gray-100 dark:bg-slate-700 px-4 py-3 border-b border-gray-200 dark:border-gray-600 flex items-center gap-2">
          <i class="fab fa-html5 text-orange-500 text-xl"></i>
          <h2 class="font-semibold text-gray-800 dark:text-gray-100">HTML</h2>
          <span class="text-xs text-gray-400 ml-auto">markup</span>
        </div>
        <textarea id="htmlCode" class="code-editor w-full h-64 p-4 resize-y" placeholder="<!-- Write your HTML here -->&#10;<div class='container'>&#10;  <h1>Hello Viewer!</h1>&#10;</div>"><!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview | CosmoTools</title>
</head>
<body>
  <div class="app">
    <h1>✨ Interactive Preview</h1>
    <p>Edit HTML/CSS/JS and click Launch Preview</p>
    <button id="demoBtn">Click me</button>
  </div>
</body>
</html></textarea>
      </div>

      <!-- CSS Editor -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700 overflow-hidden card-hover">
        <div class="bg-gray-100 dark:bg-slate-700 px-4 py-3 border-b border-gray-200 dark:border-gray-600 flex items-center gap-2">
          <i class="fab fa-css3-alt text-blue-500 text-xl"></i>
          <h2 class="font-semibold text-gray-800 dark:text-gray-100">CSS</h2>
          <span class="text-xs text-gray-400 ml-auto">styles</span>
        </div>
        <textarea id="cssCode" class="code-editor w-full h-64 p-4 resize-y" placeholder="/* Your CSS styles here */&#10;body { font-family: system-ui; background: #f4f7fc; }&#10;.app { max-width: 600px; margin: 3rem auto; text-align: center; padding: 2rem; background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }&#10;button { background: #3b82f6; border: none; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; }">body {
  background: linear-gradient(135deg, #f5f7fa 0%, #e9eef5 100%);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.app {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(4px);
  border-radius: 2rem;
  padding: 2rem 2.5rem;
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 500px;
  width: 90%;
}
h1 {
  color: #1e293b;
  font-weight: 700;
}
button {
  background: #3b82f6;
  border: none;
  padding: 10px 24px;
  border-radius: 60px;
  color: white;
  font-weight: 600;
  margin-top: 1rem;
  transition: 0.2s;
  cursor: pointer;
}
button:hover {
  background: #2563eb;
  transform: scale(1.02);
}</textarea>
      </div>

      <!-- JavaScript Editor -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700 overflow-hidden card-hover">
        <div class="bg-gray-100 dark:bg-slate-700 px-4 py-3 border-b border-gray-200 dark:border-gray-600 flex items-center gap-2">
          <i class="fab fa-js text-yellow-500 text-xl"></i>
          <h2 class="font-semibold text-gray-800 dark:text-gray-100">JavaScript</h2>
          <span class="text-xs text-gray-400 ml-auto">interactivity</span>
        </div>
        <textarea id="jsCode" class="code-editor w-full h-64 p-4 resize-y" placeholder="// Your JavaScript code&#10;console.log('Hello from Viewer!');&#10;document.getElementById('demoBtn')?.addEventListener('click', () => {&#10;  alert('CosmoTools rocks! ✨');&#10;});">document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('demoBtn');
  if (btn) {
    btn.addEventListener('click', () => {
      alert('🚀 Powered by Viewer by CosmoTools');
    });
  }
  console.log('Preview ready — edit and launch!');
});</textarea>
      </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- Small Footer with link back -->
    <footer class="text-center text-sm text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-800 pt-6 mt-4">
      <p>
        <i class="fas fa-cosmic"></i> Viewer by CosmoTools — 
        <a href="https://github.com/bhuvanesh-m-dev/cosmotools" target="_blank" class="text-indigo-500 hover:underline">Main CosmoTools Repo</a>
        · Fully client-side & secure
      </p>
    </footer>
  </div>

  <script>
    // ------------------- DOM Elements -------------------
    const htmlArea = document.getElementById('htmlCode');
    const cssArea = document.getElementById('cssCode');
    const jsArea = document.getElementById('jsCode');
    const launchBtn = document.getElementById('launchBtn');
    const zipBtn = document.getElementById('zipBtn');
    const shareBtn = document.getElementById('shareBtn');
    const clearBtn = document.getElementById('clearBtn');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    // Helper: Show toast message (auto-dismiss)
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-green-600' : (type === 'error' ? 'bg-red-600' : 'bg-blue-600');
      toast.className = `${bgColor} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 animate-bounce-in transform transition-all duration-300 text-sm font-medium`;
      const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle');
      toast.innerHTML = `<i class="fas ${icon}"></i> <span>${escapeHtml(message)}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(30px)';
        setTimeout(() => toast.remove(), 300);
      }, 3200);
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    // Dark mode handling (class on html)
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      themeIcon.classList.remove('fa-moon');
      themeIcon.classList.add('fa-sun');
    } else {
      document.documentElement.classList.remove('dark');
      themeIcon.classList.remove('fa-sun');
      themeIcon.classList.add('fa-moon');
    }
    themeToggle.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
        themeIcon.classList.remove('fa-sun');
        themeIcon.classList.add('fa-moon');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
      }
    });

    // Function to get combined HTML document (full preview)
    function buildFullHTMLDocument() {
      let htmlContent = htmlArea.value.trim() || "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Preview</title></head><body><div>Empty HTML</div></body></html>";
      let cssContent = cssArea.value;
      let jsContent = jsArea.value;
      
      // If the user provided a partial snippet (like missing DOCTYPE), we make sure it's a full document.
      // Strategy: if htmlContent doesn't contain <html> or <!DOCTYPE, we embed inside a basic structure
      if (!htmlContent.toLowerCase().includes('<!doctype') && !htmlContent.toLowerCase().includes('<html')) {
        htmlContent = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CosmoTools Preview</title><style>/* injected css */</style></head>
<body>${htmlContent}<script>/* injected js */<\/script></body>
</html>`;
      }
      // inject CSS and JS properly: either replace placeholder or append
      let finalDoc = htmlContent;
      // smart injection: if there's <style></style> or we add a style block before </head>
      if (cssContent.trim().length > 0) {
        const styleTag = `<style data-cosmo="injected">\n${cssContent}\n</style>`;
        if (finalDoc.includes('</head>')) {
          finalDoc = finalDoc.replace('</head>', `${styleTag}\n</head>`);
        } else if (finalDoc.includes('<head>')) {
          finalDoc = finalDoc.replace('<head>', `<head>\n${styleTag}`);
        } else {
          finalDoc = finalDoc.replace('<html>', `<html><head>${styleTag}</head>`);
        }
      }
      if (jsContent.trim().length > 0) {
        const scriptTag = `<script data-cosmo="injected">\n${jsContent}\n<\/script>`;
        if (finalDoc.includes('</body>')) {
          finalDoc = finalDoc.replace('</body>', `${scriptTag}\n</body>`);
        } else if (finalDoc.includes('</html>')) {
          finalDoc = finalDoc.replace('</html>', `${scriptTag}\n</html>`);
        } else {
          finalDoc += scriptTag;
        }
      }
      return finalDoc;
    }

    // 1. Launch Preview (new tab using Blob)
    launchBtn.addEventListener('click', () => {
      try {
        const fullDoc = buildFullHTMLDocument();
        const blob = new Blob([fullDoc], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const newTab = window.open();
        if (newTab) {
          newTab.location = url;
          setTimeout(() => URL.revokeObjectURL(url), 100);
          showToast('🚀 Preview launched in new tab', 'success');
        } else {
          showToast('⚠️ Pop-up blocked! Allow popups for this site.', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('Failed to generate preview: ' + err.message, 'error');
      }
    });

    // 2. Save as ZIP (JSZip)
    zipBtn.addEventListener('click', () => {
      try {
        const zip = new JSZip();
        const fullHtml = buildFullHTMLDocument();
        const cssRaw = cssArea.value;
        const jsRaw = jsArea.value;
        zip.file("index.html", fullHtml);
        zip.file("style.css", cssRaw);
        zip.file("script.js", jsRaw);
        // README.md with branding
        const readme = `# My Web Project\n\nGenerated with ❤️ by **Viewer by CosmoTools**\n\nThis project includes:\n- index.html (combined preview)\n- style.css\n- script.js\n\nVisit [CosmoTools](https://github.com/bhuvanesh-m-dev/cosmotools) for more tools.\n`;
        zip.file("README.md", readme);
        const infoTxt = `CosmoTools Viewer Export\nProject: Web Playground\nCreated: ${new Date().toUTCString()}\nRepository: https://github.com/bhuvanesh-m-dev/cosmotools\n\nThank you for using Viewer by CosmoTools!`;
        zip.file("cosmotools-info.txt", infoTxt);
        
        // generate zip and download
        zip.generateAsync({ type: "blob" }).then(function(content) {
          const link = document.createElement('a');
          const filename = `my-web-project.zip`;
          link.href = URL.createObjectURL(content);
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(link.href);
          showToast(`✅ ZIP saved as "${filename}"`, 'success');
        }).catch(err => {
          showToast('ZIP error: ' + err.message, 'error');
        });
      } catch (err) {
        showToast('ZIP generation failed: ' + err.message, 'error');
      }
    });

    // 3. SHARE Button: encode html, css, js into base64 URL hash (#data=...)
    function compressToShareData() {
      const payload = {
        h: htmlArea.value,
        c: cssArea.value,
        j: jsArea.value,
        v: 1
      };
      const jsonStr = JSON.stringify(payload);
      // using btoa with unicode support (handle wide chars)
      const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
      return base64;
    }

    function decompressFromShare(base64Str) {
      try {
        const jsonStr = decodeURIComponent(escape(atob(base64Str)));
        const data = JSON.parse(jsonStr);
        return { html: data.h || '', css: data.c || '', js: data.j || '' };
      } catch (e) {
        return null;
      }
    }

    shareBtn.addEventListener('click', () => {
      const encoded = compressToShareData();
      const currentUrl = new URL(window.location.href);
      currentUrl.hash = `#code=${encoded}`;
      const shareUrl = currentUrl.toString();
      navigator.clipboard.writeText(shareUrl).then(() => {
        showToast('🔗 Shareable link copied to clipboard!', 'success');
      }).catch(() => {
        // fallback prompt
        prompt("Copy this link to share your code:", shareUrl);
        showToast('Link generated, copy manually', 'info');
      });
    });

    // Load from URL hash on page load (populate editors)
    function loadFromHash() {
      const hash = window.location.hash.substring(1);
      if (hash && hash.startsWith('code=')) {
        const codePart = hash.substring(5);
        if (codePart) {
          const decoded = decompressFromShare(codePart);
          if (decoded) {
            if (decoded.html !== undefined) htmlArea.value = decoded.html;
            if (decoded.css !== undefined) cssArea.value = decoded.css;
            if (decoded.js !== undefined) jsArea.value = decoded.js;
            showToast('✨ Loaded shared code preview!', 'success');
            // Optionally clear hash after load to keep clean, but no issue
            setTimeout(() => {
              if (window.history && history.replaceState) {
                history.replaceState(null, '', window.location.pathname);
              }
            }, 100);
          } else {
            showToast('Invalid share link data', 'error');
          }
        }
      }
    }

    // 4. Clear All with confirmation (reset to friendly demo but not blank)
    clearBtn.addEventListener('click', () => {
      if (confirm('⚠️ Clear all code? This will reset HTML, CSS, JS to default demo.')) {
        // set to starter friendly examples that showcase the tool
        htmlArea.value = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CosmoTools Demo</title>
</head>
<body>
  <div class="hero">
    <h1>🌌 Viewer by CosmoTools</h1>
    <p>Write your HTML/CSS/JS & click "Launch Preview"</p>
    <button id="actionBtn">Explore</button>
  </div>
</body>
</html>`;
        cssArea.value = `body {
  background: linear-gradient(145deg, #0f172a, #1e293b);
  font-family: 'Segoe UI', system-ui;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  color: white;
}
.hero {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 2rem;
  border-radius: 3rem;
  text-align: center;
  max-width: 500px;
}
button {
  background: #f97316;
  border: none;
  padding: 10px 28px;
  border-radius: 60px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 1rem;
  transition: 0.2s;
}
button:hover {
  background: #ea580c;
  transform: scale(1.02);
}`;
        jsArea.value = `document.getElementById('actionBtn')?.addEventListener('click', () => {
  alert('✨ Welcome to Viewer by CosmoTools! Create, preview and share.');
  console.log('Interactive preview ready!');
});`;
        showToast('All editors cleared & reset to demo', 'info');
      }
    });

    // Attach page load event
    window.addEventListener('DOMContentLoaded', () => {
      loadFromHash();
      // If no hash present, maybe we keep default editors as already pre-filled.
      // But also ensure initial values are consistent: editors already have good default content.
      // In case they are empty but we set placeholders, but our default HTML is already in textarea.
      // Additional: auto-save not needed but nice: preserve user content after share load.
    });
    
    // small extra: to avoid XSS, we never eval, only launch in new tab via Blob -> isolated world.
    // also add validation tips
    console.log('Viewer by CosmoTools — ready');
  </script>
</body>
</html>

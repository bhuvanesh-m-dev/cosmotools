<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previewing Result</title>
</head>

<body>
    <script>
        // URL-safe base64 decoding
        function decodeCode(b64) {
            if (!b64) return '';
            b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
            while (b64.length % 4) b64 += '=';
            try {
                return decodeURIComponent(atob(b64));
            } catch (e) {
                console.warn('Failed decoding parameter');
                return '';
            }
        }

        try {
            // Read encoded params from hash
            const hashText = window.location.hash.substring(1);
            if (hashText) {
                const params = new URLSearchParams(hashText);
                const htmlCode = decodeCode(params.get('h'));
                const cssCode = decodeCode(params.get('c'));
                const jsCode = decodeCode(params.get('j'));

                // Properly construct the preview document
                const previewDocument = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <style>${cssCode}</style>
</head>
<body>
    ${htmlCode}
    <script>${jsCode}<\/script>
</body>
</html>`;

                // Overwrite the generic document with the injected content
                document.open();
                document.write(previewDocument);
                document.close();
            } else {
                document.body.innerHTML = `
                    <div style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #555;">
                        <h3>No code was dynamically provided!</h3>
                        <p>Going back to the editor in 3 seconds...</p>
                    </div>`;
                setTimeout(() => { window.location.href = './index.html'; }, 3000);
            }
        } catch (error) {
            console.error("Preview Generation Error:", error);
            document.body.innerHTML = `<h3 style="color:red; text-align:center;">Failed to generate preview.</h3>`;
        }
    </script>
</body>

</html>

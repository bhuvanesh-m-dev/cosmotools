<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer by CosmoTools</title>
    <link rel="stylesheet" href="/src/index.css">
    <!-- Prism.js Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0d1117] text-gray-200 min-h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="h-16 px-6 flex items-center justify-between border-b border-gray-800 bg-[#0d1117]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                <i data-lucide="code-2"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-none">Viewer</h1>
                <p class="text-xs text-gray-500 font-medium">by CosmoTools</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-800 transition-colors">
                <i data-lucide="sun" id="sunIcon"></i>
                <i data-lucide="moon" id="moonIcon" class="hidden"></i>
            </button>
            
            <div class="h-6 w-[1px] bg-gray-700 mx-2"></div>

            <button id="launchBtn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                <span class="hidden sm:inline">Launch Preview</span>
            </button>

            <button id="zipBtn" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg font-medium transition-all active:scale-95">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Save as ZIP</span>
            </button>

            <button id="shareBtn" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg font-medium transition-all active:scale-95 relative">
                <i data-lucide="share-2" class="w-4 h-4"></i>
                <span id="shareText" class="hidden sm:inline">Share</span>
            </button>

            <button id="clearBtn" class="p-2 rounded-lg hover:bg-red-500/10 text-red-500 transition-colors" title="Clear All">
                <i data-lucide="trash-2"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden p-1 gap-1">
        <!-- HTML Editor -->
        <div class="flex-1 flex flex-col bg-[#161b22] rounded-xl border border-gray-800 overflow-hidden">
            <div class="px-4 py-2 flex items-center justify-between border-b border-gray-800 bg-black/20">
                <span class="text-xs font-bold uppercase tracking-wider text-orange-500">HTML</span>
            </div>
            <div class="flex-1 relative overflow-hidden">
                <textarea id="htmlEditor" class="absolute inset-0 w-full h-full p-4 bg-transparent text-transparent caret-white font-mono text-sm resize-none outline-none z-10" spellcheck="false"></textarea>
                <pre class="absolute inset-0 w-full h-full p-4 pointer-events-none m-0 overflow-auto"><code id="htmlHighlight" class="language-markup"></code></pre>
            </div>
        </div>

        <!-- CSS Editor -->
        <div class="flex-1 flex flex-col bg-[#161b22] rounded-xl border border-gray-800 overflow-hidden">
            <div class="px-4 py-2 flex items-center justify-between border-b border-gray-800 bg-black/20">
                <span class="text-xs font-bold uppercase tracking-wider text-blue-500">CSS</span>
            </div>
            <div class="flex-1 relative overflow-hidden">
                <textarea id="cssEditor" class="absolute inset-0 w-full h-full p-4 bg-transparent text-transparent caret-white font-mono text-sm resize-none outline-none z-10" spellcheck="false"></textarea>
                <pre class="absolute inset-0 w-full h-full p-4 pointer-events-none m-0 overflow-auto"><code id="cssHighlight" class="language-css"></code></pre>
            </div>
        </div>

        <!-- JS Editor -->
        <div class="flex-1 flex flex-col bg-[#161b22] rounded-xl border border-gray-800 overflow-hidden">
            <div class="px-4 py-2 flex items-center justify-between border-b border-gray-800 bg-black/20">
                <span class="text-xs font-bold uppercase tracking-wider text-yellow-500">JavaScript</span>
            </div>
            <div class="flex-1 relative overflow-hidden">
                <textarea id="jsEditor" class="absolute inset-0 w-full h-full p-4 bg-transparent text-transparent caret-white font-mono text-sm resize-none outline-none z-10" spellcheck="false"></textarea>
                <pre class="absolute inset-0 w-full h-full p-4 pointer-events-none m-0 overflow-auto"><code id="jsHighlight" class="language-javascript"></code></pre>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="h-10 px-6 flex items-center justify-between text-xs border-t border-gray-800 text-gray-500 bg-[#0d1117]">
        <div class="flex items-center gap-4">
            <a href="https://github.com/bhuvanesh-m-dev/cosmotools" target="_blank" class="hover:text-indigo-500 flex items-center gap-1 transition-colors">
                <i data-lucide="github" class="w-3.5 h-3.5"></i>
                CosmoTools Repository
            </a>
            <span>•</span>
            <span>100% Stateless & Client-side</span>
        </div>
        <div>
            Created with <span class="text-indigo-500 font-bold">Viewer</span> by CosmoTools
        </div>
    </footer>

    <!-- AI Assistant Toggle -->
    <button id="aiToggle" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-2xl shadow-indigo-500/40 hover:scale-110 active:scale-95 transition-all z-50">
        <i data-lucide="sparkles"></i>
    </button>

    <!-- AI Assistant Drawer -->
    <div id="aiDrawer" class="fixed top-0 right-0 bottom-0 w-full max-w-md bg-[#0d1117] border-l border-gray-800 shadow-2xl z-[70] flex flex-col translate-x-full transition-transform duration-300 ease-in-out">
        <div class="p-4 border-b border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="sparkles" class="w-4.5 h-4.5"></i>
                </div>
                <div>
                    <h2 class="font-bold">CosmoAI</h2>
                    <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">Assistant</p>
                </div>
            </div>
            <button id="closeAi" class="p-2 hover:bg-gray-800 rounded-lg transition-colors">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div id="chatHistory" class="flex-1 overflow-auto p-4 space-y-4">
            <!-- Messages will appear here -->
            <div class="text-center py-12 space-y-4" id="emptyChat">
                <div class="w-16 h-16 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto text-indigo-500">
                    <i data-lucide="message-square" class="w-8 h-8"></i>
                </div>
                <div class="space-y-2">
                    <h3 class="font-bold text-lg">How can I help you?</h3>
                    <p class="text-sm text-gray-500 max-w-[240px] mx-auto">
                        I can help you write code, fix bugs, or analyze your design screenshots.
                    </p>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-800 space-y-3">
            <div id="imagePreview" class="hidden relative inline-block">
                <img id="previewImg" src="" alt="Preview" class="h-16 w-16 object-cover rounded-lg border border-indigo-500">
                <button id="removeImg" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-lg">
                    <i data-lucide="x" class="w-3 h-3"></i>
                </button>
            </div>
            <div class="flex items-end gap-2">
                <button id="uploadBtn" class="p-3 bg-gray-800 hover:bg-gray-700 rounded-xl transition-colors">
                    <i data-lucide="image"></i>
                </button>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div class="flex-1 relative">
                    <textarea id="aiInput" placeholder="Ask CosmoAI..." class="w-full bg-gray-800 border-gray-700 rounded-xl px-4 py-3 pr-12 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" rows="1"></textarea>
                    <button id="sendBtn" class="absolute right-2 bottom-2 p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300"></div>

    <!-- Scripts -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>

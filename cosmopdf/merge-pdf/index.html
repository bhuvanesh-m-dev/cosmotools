<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - CosmoPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-inter">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center gap-2 text-gray-900 hover:text-red-600 transition">
                        <i class="fas fa-arrow-left"></i>
                        <span class="font-bold text-xl">CosmoPDF</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">Merge PDF Files</h1>
            <p class="text-gray-600">Combine multiple PDFs into one unified document. Drag and drop to rearrange.</p>
        </div>

        <!-- Upload Area -->
        <div id="drop-zone" class="bg-white border-2 border-dashed border-gray-300 rounded-xl p-10 text-center hover:border-red-500 hover:bg-red-50 transition-all cursor-pointer mb-8">
            <input type="file" id="file-input" class="hidden" accept=".pdf" multiple>
            <div class="pointer-events-none">
                <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-4"></i>
                <h3 class="text-xl font-semibold text-gray-900 mb-2">Drop PDF files here</h3>
                <p class="text-gray-500">or click to select files</p>
            </div>
        </div>

        <!-- File List -->
        <div id="file-list-container" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-900">Selected Files (<span id="file-count">0</span>)</h3>
                <button id="clear-all" class="text-red-600 hover:text-red-800 text-sm font-medium">Clear All</button>
            </div>
            
            <div id="file-list" class="space-y-3 mb-8">
                <!-- File items will be injected here -->
            </div>

            <button id="merge-btn" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-red-700 transition transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed">
                Merge PDFs
            </button>
        </div>
        
        <!-- Loading State -->
        <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-xl flex flex-col items-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600 mb-4"></div>
                <p class="text-gray-900 font-medium">Merging your files...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

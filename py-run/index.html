<!DOCTYPE html>
<html lang="en" data-theme="dark-ocean">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PyFlow — Online Python Compiler</title>
  <meta name="description" content="A beautiful, open-source online Python compiler powered by Pyodide. No backend required."/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/solarized.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/nord.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css"/>

  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">PyFlow</span>
      </div>
      <span class="tagline">Online Python Compiler</span>
    </div>

    <div class="header-center">
      <div class="status-bar">
        <span id="pyodide-status" class="status loading">
          <span class="status-dot"></span>
          Initialising Pyodide…
        </span>
      </div>
    </div>

    <div class="header-right">
      <button class="btn-icon" id="btn-share" title="Share Code">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <a class="btn-icon" href="https://github.com/" target="_blank" title="Open Source on GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
    </div>
  </header>

  <!-- ── TOOLBAR ── -->
  <div class="toolbar">
    <div class="toolbar-left">
      <!-- Theme selector -->
      <div class="select-group">
        <label for="color-theme">🎨 Color Theme</label>
        <div class="custom-select">
          <select id="color-theme">
            <option value="dark-ocean">Dark Ocean</option>
            <option value="neon-night">Neon Night</option>
            <option value="forest-dusk">Forest Dusk</option>
            <option value="candy-pop">Candy Pop</option>
            <option value="rose-gold">Rose Gold</option>
            <option value="mono-ink">Mono Ink</option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>

      <!-- Editor theme -->
      <div class="select-group">
        <label for="editor-theme">✏️ Editor</label>
        <div class="custom-select">
          <select id="editor-theme">
            <option value="dracula">Dracula</option>
            <option value="monokai">Monokai</option>
            <option value="nord">Nord</option>
            <option value="solarized dark">Solarized Dark</option>
            <option value="material-darker">Material Darker</option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>

      <!-- Font size -->
      <div class="select-group">
        <label for="font-size">Aa</label>
        <div class="custom-select small">
          <select id="font-size">
            <option value="12">12px</option>
            <option value="13">13px</option>
            <option value="14" selected>14px</option>
            <option value="15">15px</option>
            <option value="16">16px</option>
            <option value="18">18px</option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>
    </div>

    <div class="toolbar-right">
      <button class="btn-tool" id="btn-clear-editor" title="Clear Editor">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear
      </button>
      <button class="btn-tool" id="btn-copy" title="Copy Code">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button class="btn-tool" id="btn-format" title="Format with Black">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="11" y2="18"/></svg>
        Format
      </button>
      <button class="btn-run" id="btn-run">
        <span class="run-icon">▶</span>
        <span>Run</span>
        <kbd>Ctrl+↵</kbd>
      </button>
    </div>
  </div>

  <!-- ── MAIN WORKSPACE ── -->
  <main class="workspace">

    <!-- Editor pane -->
    <div class="pane editor-pane">
      <div class="pane-header">
        <span class="pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          main.py
        </span>
        <span class="pane-pill">Python 3.11</span>
      </div>
      <div id="code-editor"></div>
    </div>

    <!-- Divider -->
    <div class="pane-divider" id="pane-divider"></div>

    <!-- Output pane -->
    <div class="pane output-pane">
      <div class="pane-header">
        <span class="pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Output
        </span>
        <div class="pane-actions">
          <button class="btn-micro" id="btn-clear-output" title="Clear Output">Clear</button>
        </div>
      </div>

      <!-- Input area (stdin) -->
      <div class="stdin-area" id="stdin-area" style="display:none">
        <label class="stdin-label">stdin ›</label>
        <input type="text" id="stdin-input" class="stdin-input" placeholder="Type input and press Enter…"/>
      </div>

      <div id="output" class="output-console"></div>

      <div class="output-footer">
        <span id="exec-time" class="exec-time"></span>
        <span id="output-stats" class="output-stats"></span>
      </div>
    </div>

  </main>

  <!-- ── PACKAGE INSTALLER ── -->
  <div class="package-bar">
    <span class="pkg-label">📦 micropip install</span>
    <input type="text" id="pkg-input" class="pkg-input" placeholder="numpy, pandas, matplotlib…"/>
    <button class="btn-install" id="btn-install">Install</button>
    <div id="pkg-status" class="pkg-status"></div>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <span>PyFlow — Powered by <strong>Pyodide</strong> &amp; <strong>CodeMirror</strong></span>
    <span class="footer-sep">·</span>
    <span>No backend · Runs entirely in your browser</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/" class="footer-link">Open Source</a>
  </footer>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast"></div>

  <!-- CodeMirror scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/autorefresh.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/keymap/sublime.min.js"></script>

  <!-- Main script -->
  <script src="script.js"></script>
</body>
</html>
